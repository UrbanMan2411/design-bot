<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandingAI — Галерея дизайнов</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #333;
        }
        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        header p {
            color: #888;
            font-size: 1.1rem;
        }
        header a {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.7rem 1.5rem;
            background: #ff6b6b;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        header a:hover { transform: scale(1.05); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #222;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .card a {
            text-decoration: none;
            color: inherit;
        }
        .card img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            display: block;
        }
        .card-info {
            padding: 1rem;
        }
        .card-info h3 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-info .meta {
            font-size: 0.8rem;
            color: #666;
        }
        .empty {
            text-align: center;
            padding: 4rem;
            color: #555;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #444;
            border-top: 1px solid #222;
        }
        footer a { color: #ff6b6b; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>LandingAI Gallery</h1>
        <p>AI-generated landing pages</p>
        <a href="https://t.me/LandAIpagebot">🎨 Create your own</a>
    </header>
    <div class="grid" id="gallery">
        <div class="empty">Loading designs...</div>
    </div>
    <footer>
        Made with <a href="https://t.me/LandAIpagebot">LandingAI</a> • Designs auto-published from Telegram bot
    </footer>
    <script>
        // Auto-populate from GitHub API
        async function loadDesigns() {
            try {
                const resp = await fetch('https://api.github.com/repos/UrbanMan2411/design-pages/contents/designs');
                const files = await resp.json();
                const designs = files
                    .filter(f => f.name.endsWith('.html') && f.name !== '.gitkeep')
                    .sort((a, b) => b.name.localeCompare(a.name))
                    .slice(0, 50);

                const grid = document.getElementById('gallery');
                if (designs.length === 0) {
                    grid.innerHTML = '<div class="empty">No designs yet. Create one with the bot!</div>';
                    return;
                }

                grid.innerHTML = designs.map(f => {
                    const slug = f.name.replace('.html', '');
                    const title = slug.replace(/-/g, ' ').replace(/[a-f0-9]{6}$/, '').trim() || 'Design';
                    const url = `designs/${f.name}`;
                    const thumb = `https://image.thum.io/get/width/600/crop/400/https://urbanman2411.github.io/design-pages/designs/${f.name}`;
                    return `
                        <div class="card">
                            <a href="${url}" target="_blank">
                                <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://picsum.photos/600/400?random=${Math.random()}'">
                                <div class="card-info">
                                    <h3>${title}</h3>
                                    <div class="meta">${f.name}</div>
                                </div>
                            </a>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('gallery').innerHTML = '<div class="empty">Error loading designs</div>';
            }
        }
        loadDesigns();
    </script>
</body>
</html>
